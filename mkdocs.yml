site_name: Open Source LabVIEW Actions
site_url: https://labview-community-ci-cd.github.io/open-source/
repo_url: https://github.com/LabVIEW-Community-CI-CD/open-source
repo_name: open-source
edit_uri: edit/actions/docs/
site_description: Actions for automating LabVIEW workflows
site_author: Open Source Actions Team

strict: true
watch:
  - docs
  - scripts
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - def_list
  - toc
  - pymdownx.superfences
  - pymdownx.highlight
nav:
  - Overview:
      - Overview: index.md
      - Architecture: architecture.md
      - Unified Dispatcher: UnifiedDispatcher.md
  - Guides:
      - Quickstart: quickstart.md
      - Environment Setup: environment-setup.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - Action Calls: action-call-reference.md
      - Common Parameters: common-parameters.md
      - Actions: actions/index.md
      - Workflows: workflows/index.md
  - Developer Docs:
      - Adapter Authoring: adapter-authoring.md
      - Versioning: versioning.md
      - Changelog: CHANGELOG.md
      - Contributing: contributing-docs.md
      - Requirements: requirements.md
      - Testing with Pester: testing-pester.md
plugins:
  - search
  - autorefs
  - redirects:
      redirect_maps:
        old-page.md: new-page.md
