name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:ci
      - run: npm run derive:registry
      - run: npm run generate:summary
        if: always()
        env:
          TEST_RESULTS_GLOB: "**/junit*.xml"
          REQ_MAPPING_FILE: "requirements.json"
          DISPATCHER_REGISTRY: "dispatchers.json"
          EVIDENCE_DIR: "test-screenshots"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traceability
          path: artifacts/traceability.*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: action-docs
          path: artifacts/action-docs.*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence
          path: artifacts/evidence/**
          if-no-files-found: ignore

  ps-ci:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          if (Test-Path "tests/pester") {
            Invoke-Pester -CI -Path tests/pester
          }
