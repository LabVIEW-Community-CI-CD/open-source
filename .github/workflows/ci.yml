name: CI

on:
  push:
    branches: [actions]
  pull_request:
    branches: [actions]

jobs:
  release-check:
    runs-on: ubuntu-24.04
    outputs:
      needs_release: ${{ steps.check.outputs.present }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - id: check
        run: |
          if [[ -f release.json ]]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: steps.check.outputs.present == 'true'
        with:
          name: release-metadata
          path: release.json

  validate-artifacts:
    needs: release-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
      - run: npm config delete proxy
      - run: npm config delete https-proxy
      - run: npm ci
      - run: npm run link:check
      - run: npm run derive:registry
      - run: git diff --exit-code -- dispatchers.json
      - run: npm run check:traceability
  ps-ci:
    needs: release-check
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            runs-on: ubuntu-24.04
            runner_type: linux
          - os: self-hosted-windows-lv
            runs-on: self-hosted-windows-lv
            runner_type: integration
          - os: self-hosted-windows-lv
            runs-on: self-hosted-windows-lv
            runner_type: default
    runs-on: ${{ matrix.runs-on }}
    env:
      RUNNER_TYPE: ${{ matrix.runner_type }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - name: Ensure PowerShell 7.5.1
        if: matrix.runner_type != 'linux'
        shell: pwsh
        run: |
          $required = [Version]'7.5.1'
          if ($PSVersionTable.PSVersion -lt $required) {
            $msiUrl = 'https://github.com/PowerShell/PowerShell/releases/download/v7.5.1/PowerShell-7.5.1-win-x64.msi'
            $msiPath = Join-Path $env:RUNNER_TEMP 'PowerShell-7.5.1-win-x64.msi'
            Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath
            $expectedHash = 'b110eccaf55bb53ae5e6b6de478587ed8203570b0bda9bd374a0998e24d4033a'
            $actualHash = (Get-FileHash $msiPath -Algorithm SHA256).Hash
            if ($actualHash -ne $expectedHash) {
              throw "SHA256 mismatch: $actualHash"
            }
            Start-Process msiexec -Wait -ArgumentList '/i', $msiPath, '/qn', 'ADD_PATH=1'
          }
          $version = (pwsh --version).Trim() -replace '^PowerShell '
          if ([Version]$version -lt $required) {
            throw "PowerShell version $version is less than $required"
          }
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester |
                    Where-Object { $_.Version -ge [Version]'5.7.1' })) {
            Remove-Module Pester -ErrorAction SilentlyContinue
            Install-Module -Name Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck
          }
      - name: Run Pester
        shell: pwsh
        run: |
          if (Test-Path "tests/pester") {
            $cfg = New-PesterConfiguration
            $cfg.Run.Path = './tests/pester'
            $cfg.TestResult.Enabled = $true
            $cfg.TestResult.OutputFormat = 'JUnitXml'
            $cfg.TestResult.OutputPath = 'pester-results/pester-junit.xml'
            $cfg.Run.Exit = $true
            Invoke-Pester -Configuration $cfg
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ (success() || failure()) && !cancelled() }}
        with:
          name: test-results-pester-${{ matrix.os }}-${{ matrix.runner_type }}
          path: pester-results
          if-no-files-found: error

  report:
    needs: [validate-artifacts, ps-ci]
    runs-on: ubuntu-24.04
    if: ${{ (success() || failure()) && !cancelled() }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
      - run: npm ci
      - run: npm run check:node
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: test-results-pester-*
          path: ./downloaded-artifacts
      - run: npm run derive:registry
      - run: npm run generate:summary
        env:
          TEST_RESULTS_GLOBS: |
            test-results/*junit*.xml
            downloaded-artifacts/test-results-pester-*/pester-junit.xml
          REQ_MAPPING_FILE: requirements.json
          DISPATCHER_REGISTRY: dispatchers.json
          EVIDENCE_DIR: artifacts/evidence
      - run: npx tsx scripts/generate-traceability-matrix.ts
      - run: cat artifacts/linux/traceability-matrix.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ (success() || failure()) && !cancelled() }}
        with:
          name: traceability-matrix
          path: artifacts/linux/traceability-matrix.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ (success() || failure()) && !cancelled() }}
        with:
          name: traceability-report
          path: |
            artifacts/linux/summary.md
            artifacts/linux/traceability.md
            artifacts/linux/traceability.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ (success() || failure()) && !cancelled() }}
        with:
          name: ci-evidence
          path: ci_evidence.txt
          if-no-files-found: error
      - run: npx tsx scripts/print-pester-traceability.ts >> "$GITHUB_STEP_SUMMARY"
